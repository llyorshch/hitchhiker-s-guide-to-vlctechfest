name: Deploy slides to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install presenterm
        run: |
          VERSION=$(curl -s https://api.github.com/repos/mfontanini/presenterm/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          curl -L --fail \
            "https://github.com/mfontanini/presenterm/releases/latest/download/presenterm-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar xz --strip-components=1
          sudo mv presenterm /usr/local/bin/

      - name: Export slides to HTML
        run: |
          mkdir _site
          python3 <<'PYEOF'
          import subprocess, os, pty

          master, slave = pty.openpty()
          proc = subprocess.Popen(
              ['presenterm', '--export-html', 'slides.md', '--output', '_site/index.html'],
              stdin=slave, stdout=slave, stderr=slave,
              close_fds=True
          )
          os.close(slave)
          # Drain output so the child doesn't block on a full PTY buffer
          while True:
              try:
                  data = os.read(master, 4096)
                  if not data:
                      break
              except OSError:
                  break
          proc.wait()
          os.close(master)
          raise SystemExit(proc.returncode)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
