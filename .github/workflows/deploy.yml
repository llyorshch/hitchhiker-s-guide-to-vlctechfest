name: Deploy slides to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm presenterm git expect

      - uses: actions/checkout@v4

      - name: Export slides to HTML
        run: |
          mkdir _site
          unbuffer presenterm --export-html slides.md --output _site/index.html < /dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: html-site
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v4

      - uses: actions/download-artifact@v4
        with:
          name: html-site
          path: _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
